e.","disprove, rebut, counter","confirm, support","U10 고급"],["scrutinize","/ˈskruːtɪ나이즈/","v.","세밀히 조사하다","examine closely","Auditors scrutinized the financial records.","examine, inspect, analyze","overlook, ignore","U10 고급"],["stipulate","/ˈstɪpjuleɪt/","v.","규정하다, 명기하다","specify as a condition","The contract stipulates a 30-day notice.","specify, require, mandate","—","U10 고급"],["supersede","/ˌsuːpərˈsiːd/","v.","대체하다","replace","Digital media superseded print newspapers.","replace, supplant, displace","—","U10 고급"],["thwart","/θwɔːrt/","v.","방해하다, 좌절시키다","prevent, frustrate","Security forces thwarted the attack.","prevent, foil, frustrate","assist, promote","U10 고급"],["undermine","/ˌʌndərˈmaɪn/","v.","약화시키다","weaken gradually","Rumors can undermine public confidence.","weaken, damage, sabotage","strengthen, support","U10 고급"],["waive","/weɪv/","v.","포기하다","give up a right","She waived her right to an attorney.","relinquish, forgo, abandon","claim, exercise","U10 고급"],["adverse","/ˈædvɜːrs/","a.","불리한","unfavorable","Adverse weather delayed the flight.","unfavorable, harmful, detrimental","favorable, beneficial","U10 고급"],["ambiguous","/æmˈbɪɡjuəs/","a.","모호한","unclear","The statement was ambiguous.","vague, unclear, equivocal","clear, unambiguous","U10 고급"],["arbitrary","/ˈɑːrbɪtreri/","a.","독단적인","based on personal whim","The decision seemed arbitrary.","random, capricious, subjective","reasoned, systematic","U10 고급"],["auspicious","/ɔːˈspɪʃəs/","a.","상서로운","favorable","It was an auspicious start to the year.","favorable, promising","inauspicious, ominous","U10 고급"],["circumspect","/ˈsɜːrkəmspekt/","a.","신중한","cautious","She was circumspect in her comments.","cautious, prudent, careful","reckless, careless","U10 고급"],["contentious","/kənˈtenʃəs/","a.","논쟁을 일으키는","controversial","The issue remains contentious.","controversial, divisive, disputed","uncontroversial","U10 고급"],["formidable","/ˈfɔːrmɪdəbl/","a.","위협적인, 굉장한","intimidating; impressive","She is a formidable opponent.","intimidating, daunting, impressive","weak, insignificant","U10 고급"],["gregarious","/ɡrɪˈɡeriəs/","a.","사교적인","sociable","He has a gregarious personality.","sociable, outgoing, extroverted","introverted, reclusive","U10 고급"],["plausible","/ˈplɔːzəbl/","a.","그럴듯한","seemingly reasonable","His explanation was plausible.","credible, believable, reasonable","implausible, unlikely","U10 고급"],["precarious","/prɪˈkeriəs/","a.","불안정한","uncertain, risky","The company is in a precarious position.","unstable, insecure, risky","stable, secure","U10 고급"],["resilient","/rɪˈzɪliənt/","a.","회복이 빠른","able to recover quickly","Children are remarkably resilient.","tough, adaptable, flexible","fragile, vulnerable","U10 고급"],["stringent","/ˈstrɪndʒənt/","a.","엄격한","strict","Stringent regulations were imposed.","strict, rigorous, severe","lenient, lax","U10 고급"],["volatile","/ˈvɑːlətl/","a.","불안정한, 변덕스러운","unstable","Markets remain volatile.","unstable, unpredictable, erratic","stable, steady","U10 고급"],["versatile","/ˈvɜːrsətl/","a.","다재다능한","having many uses","She is a versatile performer.","adaptable, flexible, multifaceted","limited, specialized","U10 고급"],["hierarchy","/ˈhaɪərɑːrki/","n.","계급제도, 서열","ranking system","Every organization has a hierarchy.","ranking, pecking order","equality","U10 고급"],["havoc","/ˈhævək/","n.","대혼란","chaos, destruction","The storm wreaked havoc on the coast.","chaos, destruction, devastation","order, calm","U10 고급"],["plight","/plaɪt/","n.","곤경","difficult situation","The plight of refugees demands attention.","predicament, difficulty, hardship","comfort, ease","U10 고급"],["predicament","/프리디커먼트/","n.","곤경","difficult situation","He found himself in a predicament.","d dilemma, quandary, difficulty","comfort, ease","U10 고급"]];
        const DATA = RAW.map(d=>({w:d[0],p:d[1],pos:d[2],kr:d[3],en:d[4],ex:d[5],syn:d[6],ant:d[7],u:d[8]}));
        const UNITS = [...new Set(DATA.map(d=>d.u))];

        function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

        const Star = ({filled}) => (
          <svg width="16" height="16" viewBox="0 0 24 24" fill={filled?"#f59e0b":"none"} stroke="#f59e0b" strokeWidth="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        );

        function App() {
          const [mode, setMode] = useState("menu");
          const [selectedUnits, setSelectedUnits] = useState(new Set(UNITS));
          const [cards, setCards] = useState([]);
          const [idx, setIdx] = useState(0);
          const [flipped, setFlipped] = useState(false);
          const [score, setScore] = useState(0);
          const [total, setTotal] = useState(0);
          const [chosen, setChosen] = useState(null);
          const [options, setOptions] = useState([]);
          const [starred, setStarred] = useState(new Set());
          const [showStarredOnly, setShowStarredOnly] = useState(false);
          const [streak, setStreak] = useState(0);
          const [maxStreak, setMaxStreak] = useState(0);
          const [animDir, setAnimDir] = useState("");

          useEffect(()=>{
            const savedStarred = localStorage.getItem("teps-starred");
            if(savedStarred) setStarred(new Set(JSON.parse(savedStarred)));
            
            const savedStats = localStorage.getItem("teps-stats");
            if(savedStats) setMaxStreak(JSON.parse(savedStats).maxStreak || 0);
          },[]);

          const saveStarred = useCallback((s)=>{
            localStorage.setItem("teps-starred", JSON.stringify([...s]));
          },[]);

          const saveStats = useCallback((ms)=>{
            localStorage.setItem("teps-stats", JSON.stringify({maxStreak:ms}));
          },[]);

          const filtered = useMemo(()=>{
            let f = DATA.filter(d=>selectedUnits.has(d.u));
            if(showStarredOnly) f = f.filter(d=>starred.has(d.w));
            return f;
          },[selectedUnits,showStarredOnly,starred]);

          const startSession = (m) => {
            const shuffled = shuffle(filtered);
            setCards(shuffled);
            setIdx(0);setFlipped(false);setScore(0);setTotal(0);setChosen(null);setStreak(0);setAnimDir("");
            setMode(m);
            if(m==="quiz"&&shuffled.length>0) genOptions(shuffled,0);
          };

          const genOptions = (pool, i) => {
            const correct = pool[i];
            const others = DATA.filter(d=>d.w!==correct.w);
            const picks = shuffle(others).slice(0,3);
            const opts = shuffle([correct,...picks]);
            setOptions(opts);
            setChosen(null);
          };

          const handleNext = () => {
            if(idx<cards.length-1){
              setAnimDir("next");
              setTimeout(()=>{
                const ni=idx+1;
                setIdx(ni);setFlipped(false);setChosen(null);setAnimDir("");
                if(mode==="quiz") genOptions(cards,ni);
              },150);
            }
          };

          const handlePrev = () => {
            if(idx>0){
              setAnimDir("prev");
              setTimeout(()=>{
                const ni=idx-1;
                setIdx(ni);setFlipped(false);setChosen(null);setAnimDir("");
                if(mode==="quiz") genOptions(cards,ni);
              },150);
            }
          };

          const handleQuizAnswer = (opt) => {
            if(chosen!==null) return;
            setChosen(opt.w);
            setTotal(t=>t+1);
            const correct = opt.w === cards[idx].w;
            if(correct){
              setScore(s=>s+1);
              const ns = streak+1;
              setStreak(ns);
              if(ns>maxStreak){setMaxStreak(ns);saveStats(ns);}
            } else {
              setStreak(0);
            }
            setTimeout(handleNext, correct?800:1500);
          };

          const toggleStar = (word) => {
            const ns = new Set(starred);
            if(ns.has(word)) ns.delete(word); else ns.add(word);
            setStarred(ns);
            saveStarred(ns);
          };

          const toggleUnit = (u) => {
            const ns = new Set(selectedUnits);
            if(ns.has(u)) ns.delete(u); else ns.add(u);
            setSelectedUnits(ns);
          };

          const card = cards[idx];

          if(mode==="menu") return (
            <div style={styles.container}>
              <div style={styles.menuInner}>
                <div style={styles.logoArea}>
                  <div style={styles.logoIcon}>T</div>
                  <h1 style={styles.title}>TEPS Vocab</h1>
                  <p style={styles.subtitle}>{DATA.length}개 어휘 · 10 Units</p>
                </div>

                <div style={styles.statsRow}>
                  <div style={styles.statBox}>
                    <div style={styles.statNum}>{starred.size}</div>
                    <div style={styles.statLabel}>즐겨찾기</div>
                  </div>
                  <div style={styles.statBox}>
                    <div style={styles.statNum}>{maxStreak}</div>
                    <div style={styles.statLabel}>최고 연속</div>
                  </div>
                  <div style={styles.statBox}>
                    <div style={styles.statNum}>{filtered.length}</div>
                    <div style={styles.statLabel}>선택 어휘</div>
                  </div>
                </div>

                <div style={styles.section}>
                  <div style={styles.sectionTitle}>학습 모드</div>
                  <button style={styles.modeBtn} onClick={()=>startSession("flash")}>
                    <span style={styles.modeIcon}>📇</span>
                    <div><div style={styles.modeName}>플래시카드</div><div style={styles.modeDesc}>탭하여 뜻 확인 · 자기 평가</div></div>
                  </button>
                  <button style={styles.modeBtn} onClick={()=>startSession("quiz")}>
                    <span style={styles.modeIcon}>🎯</span>
                    <div><div style={styles.modeName}>4지선다 퀴즈</div><div style={styles.modeDesc}>한국어 뜻 → 영단어 맞추기</div></div>
                  </button>
                </div>

                <div style={styles.section}>
                  <div style={{...styles.sectionTitle,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>Unit 선택</span>
                    <div style={{display:"flex",gap:8}}>
                      <button style={styles.miniBtn} onClick={()=>setSelectedUnits(new Set(UNITS))}>전체</button>
                      <button style={styles.miniBtn} onClick={()=>setSelectedUnits(new Set())}>해제</button>
                    </div>
                  </div>
                  <div style={styles.unitGrid}>
                    {UNITS.map(u=>(
                      <button key={u} onClick={()=>toggleUnit(u)}
                        style={{...styles.unitChip, background:selectedUnits.has(u)?"#f59e0b":"#1e293b", color:selectedUnits.has(u)?"#0f172a":"#94a3b8"}}>
                        {u}
                      </button>
                    ))}
                  </div>
                </div>

                <label style={styles.checkRow} onClick={()=>setShowStarredOnly(!showStarredOnly)}>
                  <div style={{...styles.checkbox,background:showStarredOnly?"#f59e0b":"transparent"}}>
                    {showStarredOnly&&<span style={{color:"#0f172a",fontSize:12,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{color:"#cbd5e1",fontSize:14}}>즐겨찾기만 학습 ({starred.size}개)</span>
                </label>
              </div>
            </div>
          );

          if(mode==="flash") return (
            <div style={styles.container}>
              <div style={styles.topBar}>
                <button style={styles.backBtn} onClick={()=>setMode("menu")}>← 메뉴</button>
                <div style={styles.counter}>{idx+1} / {cards.length}</div>
                <button style={styles.shuffleBtn} onClick={()=>{setCards(shuffle(cards));setIdx(0);setFlipped(false);}}>🔀</button>
              </div>
              <div style={styles.progressBarWrap}><div style={{...styles.progressBar,width:`${((idx+1)/cards.length)*100}%`}}/></div>
              {card && (
                <div style={{...styles.cardArea, opacity:animDir?0:1, transform:animDir==="next"?"translateX(-30px)":animDir==="prev"?"translateX(30px)":"translateX(0)", transition:"all 0.15s ease"}}>
                  <div style={styles.flashCard} onClick={()=>setFlipped(!flipped)}>
                    <div style={styles.cardUnit}>{card.u} · {card.pos}</div>
                    <div style={styles.starBtn} onClick={(e)=>{e.stopPropagation();toggleStar(card.w);}}>
                      <Star filled={starred.has(card.w)}/>
                    </div>
                    {!flipped ? (
                      <div style={styles.cardFront}>
                        <div style={styles.bigWord}>{card.w}</div>
                        <div style={styles.pron}>{card.p}</div>
                        <div style={styles.tapHint}>탭하여 뜻 보기</div>
                      </div>
                    ) : (
                      <div style={styles.cardBack}>
                        <div style={styles.bigWord}>{card.w}</div>
                        <div style={styles.pron}>{card.p}</div>
                        <div style={styles.divider}/>
                        <div style={styles.korMeaning}>{card.kr}</div>
                        <div style={styles.engMeaning}>{card.en}</div>
                        {card.ex&&<div style={styles.example}>"{card.ex}"</div>}
                        <div style={styles.synAntRow}>
                          {card.syn&&card.syn!=="—"&&<span style={styles.synTag}>≈ {card.syn}</span>}
                          {card.ant&&card.ant!=="—"&&<span style={styles.antTag}>↔ {card.ant}</span>}
                        </div>
                      </div>
                    )}
                  </div>
                  <div style={styles.navRow}>
                    <button style={{...styles.navBtn,opacity:idx===0?0.3:1}} onClick={handlePrev} disabled={idx===0}>◀ 이전</button>
                    <button style={{...styles.navBtn,opacity:idx===cards.length-1?0.3:1}} onClick={handleNext} disabled={idx===cards.length-1}>다음 ▶</button>
                  </div>
                </div>
              )}
            </div>
          );

          if(mode==="quiz") return (
            <div style={styles.container}>
              <div style={styles.topBar}>
                <button style={styles.backBtn} onClick={()=>setMode("menu")}>← 메뉴</button>
                <div style={styles.counter}>{idx+1} / {cards.length}</div>
                <div style={styles.scoreDisplay}>✓{score} · 🔥{streak}</div>
              </div>
              <div style={styles.progressBarWrap}><div style={{...styles.progressBar,width:`${((idx+1)/cards.length)*100}%`}}/></div>
              {card && (
                <div style={{...styles.cardArea, opacity:animDir?0:1, transition:"all 0.15s ease"}}>
                  <div style={styles.quizCard}>
                    <div style={styles.cardUnit}>{card.u} · {card.pos}</div>
                    <div style={styles.starBtn} onClick={()=>toggleStar(card.w)}>
                      <Star filled={starred.has(card.w)}/>
                    </div>
                    <div style={styles.quizPrompt}>{card.kr}</div>
                    {card.p&&<div style={{...styles.pron,marginTop:4,fontSize:13,opacity:0.5}}>{card.p}</div>}
                  </div>
                  <div style={styles.optionsGrid}>
                    {options.map((opt,i)=>{
                      const isCorrect = opt.w===card.w;
                      const isChosen = chosen===opt.w;
                      const revealed = chosen!==null;
                      let bg = "#1e293b";
                      if(revealed&&isCorrect) bg="#166534";
                      else if(revealed&&isChosen&&!isCorrect) bg="#991b1b";
                      return (
                        <button key={i} onClick={()=>handleQuizAnswer(opt)}
                          style={{...styles.optionBtn,background:bg,borderColor:revealed&&isCorrect?"#22c55e":revealed&&isChosen?"#ef4444":"#334155",
                            transform:isChosen?"scale(0.97)":"scale(1)"}}>
                          <div style={styles.optWord}>{opt.w}</div>
                          {revealed&&isCorrect&&<div style={styles.optEn}>{opt.en}</div>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              {idx>=cards.length-1&&chosen!==null&&(
                <div style={styles.resultOverlay}>
                  <div style={styles.resultCard}>
                    <div style={styles.resultEmoji}>{score/total>0.8?"🎉":score/total>0.5?"👍":"💪"}</div>
                    <div style={styles.resultTitle}>학습 완료!</div>
                    <div style={styles.resultScore}>{score} / {total} 정답</div>
                    <div style={styles.resultPct}>{Math.round(score/total*100)}%</div>
                    <button style={styles.resultBtn} onClick={()=>startSession("quiz")}>다시 풀기</button>
                    <button style={{...styles.resultBtn,background:"transparent",border:"1px solid #475569"}} onClick={()=>setMode("menu")}>메뉴로</button>
                  </div>
                </div>
              )}
            </div>
          );
          return null;
        }

        const styles = {
          container:{minHeight:"100vh",background:"#0f172a",color:"#e2e8f0",fontFamily:"'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",maxWidth:480,margin:"0 auto",position:"relative",overflowX:"hidden"},
          menuInner:{padding:"20px 16px 40px"},
          logoArea:{textAlign:"center",padding:"24px 0 16px"},
          logoIcon:{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:800,color:"#0f172a",marginBottom:12},
          title:{fontSize:26,fontWeight:800,color:"#f8fafc",margin:"8px 0 4px",letterSpacing:"-0.5px"},
          subtitle:{fontSize:14,color:"#64748b",margin:0},
          statsRow:{display:"flex",gap:8,margin:"20px 0"},
          statBox:{flex:1,background:"#1e293b",borderRadius:12,padding:"14px 8px",textAlign:"center",border:"1px solid #334155"},
          statNum:{fontSize:22,fontWeight:700,color:"#f59e0b"},
          statLabel:{fontSize:11,color:"#64748b",marginTop:4},
          section:{marginTop:24},
          sectionTitle:{fontSize:13,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10},
          modeBtn:{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"16px",background:"#1e293b",border:"1px solid #334155",borderRadius:14,cursor:"pointer",marginBottom:8,textAlign:"left",transition:"all 0.2s"},
          modeIcon:{fontSize:28,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a",borderRadius:12},
          modeName:{fontSize:16,fontWeight:600,color:"#f8fafc"},
