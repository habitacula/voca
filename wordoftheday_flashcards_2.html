Titanic describes something of exceptional strength, size, or power.","ko_def":"매우 거대한, 위력이 엄청난","en_example":"The merger required a titanic effort from both legal and financial teams.","ko_example":"그 합병에는 법무팀과 재무팀 모두의 엄청난 노력이 필요했다.","synonyms":"colossal, enormous, mighty","antonyms":"tiny, trivial, insignificant"},{"word":"truculent","pos":"adjective","pronunciation":"TRUCK-yuh-lunt","en_def":"Describes a person who is easily annoyed and eager to argue or fight.","ko_def":"쉽게 짜증을 내며 싸우거나 언쟁하려 드는, 공격적인, 호전적인","en_example":"The toddler became truculent whenever he didn't get the toy he wanted.","ko_example":"그 유아는 원하는 장난감을 갖지 못할 때마다 공격적으로 변했습니다.","synonyms":"aggressive, belligerent, confrontational","antonyms":"amiable"},{"word":"umbrage","pos":"noun","pronunciation":"UM-brij","en_def":"Umbrage refers to a feeling of being offended by what someone has said or done.","ko_def":"누군가의 말이나 행동으로 인해 느끼는 불쾌감이나 노여움을 의미합니다.","en_example":"He took umbrage at the suggestion that his success was merely due to","ko_example":"그는 자신의 성공이 단지 운 때문이었다는 암시에 불쾌감을 느꼈습니다.","synonyms":"offense, resentment, annoyance","antonyms":"pleasure"},{"word":"umpteen","pos":"adjective","pronunciation":"UMP-teen","en_def":"Umpteen means indefinitely many; a large but unspecified number.","ko_def":"셀 수 없이 많은","en_example":"I've told you umpteen times to back up your files before making changes.","ko_example":"변경하기 전에 파일을 백업하라고 수없이 말했잖아.","synonyms":"countless, numerous, many","antonyms":"few, scarce, none"},{"word":"unabashed","pos":"adjective","pronunciation":"un-uh-BASHT","en_def":"Someone who is unabashed is not embarrassed or ashamed about openly expressing strong feelings or opinions.","ko_def":"부끄러워하거나 창피해하지 않고 강한 감정이나 의견을 터놓고 표현하는.","en_example":"She had an unabashed love for cheesy pop music, singing along loudly in her car with the windows down.","ko_example":"그녀는 유치한 팝 음악에 대해 부끄럼 없는 애정을 가지고 있었고, 차창을 내린 채 큰 소리로 노래를 따라 불렀습니다.","synonyms":"shameless, brazen, unapologetic","antonyms":"abashed"},{"word":"undulate","pos":"verb","pronunciation":"UN-juh-layt","en_def":"To undulate is to move with a smooth, wave-like motion, or to have a wavy form.","ko_def":"파도처럼 움직이거나 물결 모양을 형성함","en_example":"The golden wheat fields undulated gently in the afternoon breeze.","ko_example":"황금빛 밀밭이 오후의 산들바람에 물결치듯 부드럽게 흔들렸다.","synonyms":"ripple, wave, oscillate","antonyms":"flatten, still, stabilize"},{"word":"vamoose","pos":"verb","pronunciation":"vuh-MOOSS","en_def":"Vamoose is an informal word that means \"to depart quickly.\"","ko_def":"(비격식) 서둘러 떠나다, 재빨리 사라지다.","en_example":"When the kids heard their mom's car pull into the driveway, they knew it was time to vamoose from the cookie jar.","ko_example":"아이들은 엄마의 차가 진입로로 들어서는 소리를 듣자, 쿠키 단지에서 재빨리 사라져야 할 시간이라는 것을 알았습니다.","synonyms":"flee, scram, skedaddle","antonyms":"stay"},{"word":"vaunted","pos":"adjective","pronunciation":"VAWN-tud","en_def":"Vaunted describes something that is highly praised or boasted about, sometimes more than it deserves.","ko_def":"과시되는, 널리 칭송되는","en_example":"The team's vaunted defense completely collapsed in the championship game.","ko_example":"그 팀의 자랑스러운 수비진은 챔피언십 경기에서 완전히 무너졌다.","synonyms":"acclaimed, celebrated, boasted","antonyms":"unsung, overlooked, modest"},{"word":"vendetta","pos":"noun","pronunciation":"ven-DET-uh","en_def":"Vendetta refers to an active and mutual hatred between two families or groups, also known as a blood feud.","ko_def":"두 가문이나 집단 사이의 적극적이고 상호적인 증오, 또는 '피의 복수'라고도 불리는 불화를 의미합니다.","en_example":"After the merger failed, the CEO waged a personal vendetta against his","ko_example":"합병이 실패한 후, CEO는 경쟁사의 유능한 직원들을 빼내려 시도하며 개인적인 복수극을 벌였습니다.","synonyms":"feud, grudge, vengeance","antonyms":"forgiveness"},{"word":"veracity","pos":"noun","pronunciation":"vuh-RASS-uh-tee","en_def":"A formal word that can refer to truth or accuracy, or to the quality of being truthful or honest.","ko_def":"진실이나 정확성, 또는 진실하거나 정직한 성질을 의미하는 격식 있는 단어입니다.","en_example":"The lawyer questioned the veracity of the witness's statement during","ko_example":"변호사는 반대 심문 중에 증인 진술의 진실성에 의문을 제기했다.","synonyms":"truthfulness, accuracy, credibility","antonyms":"dishonesty"},{"word":"vertiginous","pos":"adjective","pronunciation":"ver-TIJ-uh-nus","en_def":"Vertiginous describes something extremely high or steep, causing a feeling of dizziness.","ko_def":"아찔한, 현기증 나는","en_example":"She gripped the railing tightly on the vertiginous bridge overlooking the canyon.","ko_example":"그녀는 협곡을 내려다보는 아찔하게 높은 다리에서 난간을 꽉 붙잡았다.","synonyms":"dizzying, dizzy, staggering","antonyms":"stable, grounded, level"},{"word":"waggish","pos":"adjective","pronunciation":"WAG-ish","en_def":"Waggish describes someone who is silly and playful, and especially someone who displays a mischievous sense of humor.","ko_def":"익살스럽고 장난기가 많으며, 특히 짓궂은 유머 감각을 보여주는 사람이나 행동을 묘사합니다.","en_example":"The teacher couldn't help but smile at the student's waggish excuse","ko_example":"선생님은 지각에 대한 학생의 익살맞은 변명에 웃음을 참을 수 없었습니다.","synonyms":"playful, mischievous, jocular","antonyms":"solemn"},{"word":"writhe","pos":"verb","pronunciation":"RYTHE","en_def":"To writhe is to twist one's body from side to side.","ko_def":"(주로 고통으로) 몸을 이리저리 비틀다, 몸부림치다.","en_example":"The snake began to writhe after being caught in the net.","ko_example":"뱀은 그물에 걸리자 몸부림치기 시작했다.","synonyms":"squirm, thrash, flail","antonyms":"still"},{"word":"yen","pos":"noun","pronunciation":"YEN","en_def":"A yen is a longing or yearning for something.","ko_def":"강렬한 욕망, 갈망","en_example":"After years abroad, he had a deep yen to return to his hometown.","ko_example":"수년간의 해외 생활 후, 그는 고향으로 돌아가고 싶은 간절한 그리움을 느꼈다.","synonyms":"longing, craving, desire","antonyms":"aversion, disinterest, indifference"},{"word":"zany","pos":"adjective","pronunciation":"ZAY-nee","en_def":"Zany describes something amusingly unconventional and idiosyncratic in an endearing way.","ko_def":"매우 엉뚱하고 우스꽝스러운","en_example":"Her zany sense of humor made even the most tedious meetings bearable.","ko_example":"그녀의 엉뚱한 유머 감각은 가장 지루한 회의도 견딜 만하게 만들었다.","synonyms":"eccentric, wacky, quirky","antonyms":"serious, conventional, sober"}];

let deck = [...Array(WORDS.length).keys()];
let currentIdx = 0;
let isFlipped = false;
let showKo = true;
let knownSet = new Set(JSON.parse(localStorage.getItem('acfc_known') || '[]'));
let unknownSet = new Set(JSON.parse(localStorage.getItem('acfc_unknown') || '[]'));
let filterUnknown = false;

function save() {
  localStorage.setItem('acfc_known', JSON.stringify([...knownSet]));
  localStorage.setItem('acfc_unknown', JSON.stringify([...unknownSet]));
}

function updateStats() {
  const total = deck.length;
  const pos = currentIdx + 1;
  document.getElementById('totalCount').textContent = WORDS.length;
  document.getElementById('knownCount').textContent = knownSet.size;
  document.getElementById('unknownCount').textContent = unknownSet.size;
  document.getElementById('currentPos').textContent = pos + ' / ' + total;
  document.getElementById('cardNum').textContent = pos + ' / ' + total;
  document.getElementById('cardNumBack').textContent = pos + ' / ' + total;
  const pct = total > 1 ? ((pos - 1) / (total - 1)) * 100 : 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function render() {
  const wi = deck[currentIdx];
  const w = WORDS[wi];
  // Front
  document.getElementById('frontPos').textContent = w.pos || 'word';
  document.getElementById('frontWord').textContent = w.word;
  document.getElementById('frontPron').textContent = w.pronunciation ? '/' + w.pronunciation + '/' : '';
  // Back
  document.getElementById('backDefEn').textContent = w.en_def || '';
  document.getElementById('backDefKo').style.display = showKo ? 'block' : 'none';
  document.getElementById('backDefKo').textContent = w.ko_def || '';
  document.getElementById('backExEn').textContent = w.en_example || '';
  document.getElementById('backExEn').style.display = w.en_example ? 'block' : 'none';
  document.getElementById('backExKo').style.display = (showKo && w.ko_example) ? 'block' : 'none';
  document.getElementById('backExKo').textContent = w.ko_example || '';
  document.getElementById('backSyn').textContent = w.synonyms || '—';
  document.getElementById('backAnt').textContent = w.antonyms || '—';
  // Known/unknown state
  const kb = document.getElementById('knownBtn');
  const ub = document.getElementById('unknownBtn');
  kb.classList.toggle('marked', knownSet.has(wi));
  ub.classList.toggle('marked', unknownSet.has(wi));
  updateStats();
  updateWordGrid();
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx === deck.length - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card3d').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= deck.length) return;
  currentIdx = newIdx;
  if (isFlipped) {
    isFlipped = false;
    document.getElementById('card3d').classList.remove('flipped');
  }
  render();
}

function markKnown() {
  const wi = deck[currentIdx];
  if (knownSet.has(wi)) { knownSet.delete(wi); }
  else { knownSet.add(wi); unknownSet.delete(wi); }
  save(); render();
  showToast(knownSet.has(wi) ? '✅ 완벽해요!' : '↩ 취소됨');
}

function markUnknown() {
  const wi = deck[currentIdx];
  if (unknownSet.has(wi)) { unknownSet.delete(wi); }
  else { unknownSet.add(wi); knownSet.delete(wi); }
  save(); render();
  showToast(unknownSet.has(wi) ? '📌 복습 목록에 추가!' : '↩ 취소됨');
}

function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  currentIdx = 0; isFlipped = false;
  document.getElementById('card3d').classList.remove('flipped');
  render();
  showToast('🔀 셔플 완료!');
}

function filterMode() {
  filterUnknown = !filterUnknown;
  const btn = document.querySelector('[onclick="filterMode()"]');
  if (filterUnknown) {
    const newDeck = [...Array(WORDS.length).keys()].filter(i => unknownSet.has(i));
    if (newDeck.length === 0) { showToast('📌 아직 표시된 단어가 없어요!'); filterUnknown = false; return; }
    deck = newDeck;
    btn.classList.add('btn-active-green');
    showToast('📌 모르는 단어만 보기 (' + deck.length + '개)');
  } else {
    deck = [...Array(WORDS.length).keys()];
    btn.classList.remove('btn-active-green');
    showToast('📋 전체 단어 보기');
  }
  currentIdx = 0; isFlipped = false;
  document.getElementById('card3d').classList.remove('flipped');
  render();
}

function toggleLang() {
  showKo = !showKo;
  document.getElementById('langBtn').textContent = showKo ? '🌏 KO·EN' : '🌐 EN Only';
  render();
}

function resetAll() {
  if (!confirm('모든 학습 기록을 리셋할까요?')) return;
  knownSet.clear(); unknownSet.clear();
  deck = [...Array(WORDS.length).keys()];
  currentIdx = 0; isFlipped = false; filterUnknown = false;
  document.getElementById('card3d').classList.remove('flipped');
  document.querySelector('[onclick="filterMode()"]').classList.remove('btn-active-green');
  save(); render();
  showToast('🔄 초기화 완료!');
}

function toggleList() {
  const p = document.getElementById('wordListPanel');
  p.classList.toggle('open');
}

function updateWordGrid() {
  const grid = document.getElementById('wordGrid');
  const wi = deck[currentIdx];
  grid.innerHTML = WORDS.map((w, i) => {
    let cls = 'word-chip';
    if (deck[currentIdx] === i) cls += ' current-chip';
    else if (knownSet.has(i)) cls += ' known-chip';
    else if (unknownSet.has(i)) cls += ' unknown-chip';
    return '<div class="' + cls + '" onclick="jumpTo(' + i + ')">' + w.word + '</div>';
  }).join('');
}

function jumpTo(wordIdx) {
  const di = deck.indexOf(wordIdx);
  if (di === -1) {
    // If not in current deck, switch to full deck
    deck = [...Array(WORDS.length).keys()];
    filterUnknown = false;
    document.querySelector('[onclick="filterMode()"]').classList.remove('btn-active-green');
    currentIdx = wordIdx;
  } else {
    currentIdx = di;
  }
  isFlipped = false;
  document.getElementById('card3d').classList.remove('flipped');
  render();
  document.getElementById('wordListPanel').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'k') markKnown();
  else if (e.key === 'u') markUnknown();
});

// Swipe support
let touchStartX = 0;
document.querySelector('.card-scene').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, {passive: true});
document.querySelector('.card-scene').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { navigate(dx < 0 ? 1 : -1); }
  else { flipCard(); }
}, {passive: true});

// Init
render();
</script>
</body>
</html>
